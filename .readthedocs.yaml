version: 2

python:
  install:
    - method: "uv"
      command: "sync"
      groups:
        - "docs"

build:
  os: "ubuntu-24.04"
  tools:
    python: "3.13"
  jobs:
    - "cd docs"
    - "myst build --html"
    - "mkdir --parents $READTHEDOCS_OUTPUT/html/"
    - "mv _build/html/* $READTHEDOCS_OUTPUT/html/."
    - "rm -rf _build"  # RTD build fails if _build/html is detected :(
